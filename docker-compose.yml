version: '3.8'

services:
  # Nginx Proxy Manager
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./nginx/data:/data
      - ./nginx/letsencrypt:/etc/letsencrypt
    networks:
      - vk-bot-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vk-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    networks:
      - vk-bot-network

  # Backend (Node.js API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vk-backend
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@supabase:5432/vk_bot
      - JWT_SECRET=${JWT_SECRET}
      - VK_CLIENT_ID=${VK_CLIENT_ID}
      - VK_CLIENT_SECRET=${VK_CLIENT_SECRET}
      - OK_CLIENT_ID=${OK_CLIENT_ID}
      - OK_CLIENT_SECRET=${OK_CLIENT_SECRET}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - YOOKASSA_WEBHOOK_URL=${YOOKASSA_WEBHOOK_URL}
      - YOOMONEY_ACCOUNT_NUMBER=${YOOMONEY_ACCOUNT_NUMBER}
      - YOOMONEY_API_KEY=${YOOMONEY_API_KEY}
      - YOOMONEY_WEBHOOK_URL=${YOOMONEY_WEBHOOK_URL}
      - YOOMONEY_VERIFIED_USER_VK_ID=${YOOMONEY_VERIFIED_USER_VK_ID}
      - PAYMENT_METHOD_YOOKASSA_ENABLED=${PAYMENT_METHOD_YOOKASSA_ENABLED:-true}
      - PAYMENT_METHOD_YOOMONEY_P2P_ENABLED=${PAYMENT_METHOD_YOOMONEY_P2P_ENABLED:-false}
      - PAYMENT_METHOD_CARDS_ENABLED=${PAYMENT_METHOD_CARDS_ENABLED:-true}
      - N8N_API_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY}
      - NOCODB_API_URL=http://nocodb:8080
      - NOCODB_API_KEY=${NOCODB_API_KEY}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      - supabase
      - n8n
      - nocodb
    networks:
      - vk-bot-network

  # n8n Automation
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_JWT_SECRET=${N8N_JWT_SECRET}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=supabase
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRESDB_DATABASE=vk_bot
      - WEBHOOK_URL=https://${N8N_HOST}/
    volumes:
      - ./n8n/data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    depends_on:
      - supabase
    networks:
      - vk-bot-network

  # NocoDB
  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    restart: unless-stopped
    environment:
      - NC_DB=pg://supabase:5432?u=postgres&p=${POSTGRES_PASSWORD}&d=vk_bot
      - NC_AUTH_JWT_SECRET=${NC_JWT_SECRET}
      - NC_PUBLIC_URL=https://${NOCODB_HOST}
    volumes:
      - ./nocodb/data:/usr/app/data
    depends_on:
      - supabase
    networks:
      - vk-bot-network

  # Supabase (PostgreSQL)
  supabase:
    image: supabase/postgres:15.1.0.117
    container_name: supabase
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=vk_bot
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - supabase_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    networks:
      - vk-bot-network

  # Redis (caching, sessions)
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - vk-bot-network

  # Watchtower (auto-update)
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 86400
    networks:
      - vk-bot-network

networks:
  vk-bot-network:
    driver: bridge

volumes:
  supabase_data:
  redis_data:
