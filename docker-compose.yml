services:
  # Frontend (React/Static)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vk-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - vk-bot-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Backend (Node.js API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vk-backend
    restart: unless-stopped
    # Backend доступен только внутри сети
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@supabase:5432/vk_bot
      - JWT_SECRET=${JWT_SECRET}
      - VK_CLIENT_ID=${VK_CLIENT_ID:-dev_client_id}
      - VK_CLIENT_SECRET=${VK_CLIENT_SECRET:-dev_client_secret}
      - VK_REDIRECT_URI=${VK_REDIRECT_URI:-http://localhost:3000}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID:-}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY:-}
      - YOOKASSA_WEBHOOK_URL=${YOOKASSA_WEBHOOK_URL:-}
      - YOOMONEY_ACCOUNT_NUMBER=${YOOMONEY_ACCOUNT_NUMBER:-}
      - YOOMONEY_API_KEY=${YOOMONEY_API_KEY:-}
      - YOOMONEY_WEBHOOK_URL=${YOOMONEY_WEBHOOK_URL:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FRONTEND_URL=http://frontend:3000
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      supabase:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - vk-bot-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Supabase (PostgreSQL)
  supabase:
    build:
      context: ./supabase
      dockerfile: Dockerfile
    container_name: supabase
    restart: unless-stopped
    # PostgreSQL доступен только внутри сети
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=vk_bot
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - supabase_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    networks:
      - vk-bot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vk_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Redis (caching, sessions)
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    # Redis доступен только внутри сети
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - vk-bot-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Watchtower (auto-update)
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 86400
    networks:
      - vk-bot-network

networks:
  vk-bot-network:
    driver: bridge

volumes:
  supabase_data:
  redis_data:
