services:
  # PHP-FPM для Laravel
  php:
    build:
      context: ./frontend
      dockerfile: Dockerfile.php
    container_name: vk-php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      # Монтируем только app, config, routes, resources - не vendor!
      - ./frontend/php-app/app:/var/www/html/app
      - ./frontend/php-app/config:/var/www/html/config
      - ./frontend/php-app/routes:/var/www/html/routes
      - ./frontend/php-app/resources:/var/www/html/resources
      - ./frontend/php-app/public:/var/www/html/public
      - ./frontend/php-app/.env:/var/www/html/.env
      # Storage и cache - отдельные volume
      - php_storage:/var/www/html/storage
      - php_bootstrap:/var/www/html/bootstrap/cache
    networks:
      - vk-bot-network
    depends_on:
      - supabase
      - redis

  # Nginx для PHP с SSL
  nginx-php:
    image: nginx:alpine
    container_name: vk-nginx-php
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./frontend/php-app:/var/www/html
      - ./frontend/nginx-php.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - vk-bot-network
    depends_on:
      - php
      - backend

  # Frontend (React/Static) с SSL - отключён для PHP миграции
  frontend:
    profiles:
      - legacy
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vk-frontend
    restart: unless-stopped
    ports:
      - "443:443"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - vk-bot-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Backend (Node.js API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vk-backend
    restart: unless-stopped
    # Backend доступен только внутри сети
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@supabase:5432/vk_bot
      - JWT_SECRET=${JWT_SECRET}
      - VK_CLIENT_ID=${VK_CLIENT_ID:-dev_client_id}
      - VK_CLIENT_SECRET=${VK_CLIENT_SECRET:-dev_client_secret}
      - VK_REDIRECT_URI=${VK_REDIRECT_URI:-http://localhost:3000}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID:-}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY:-}
      - YOOKASSA_WEBHOOK_URL=${YOOKASSA_WEBHOOK_URL:-}
      - YOOMONEY_ACCOUNT_NUMBER=${YOOMONEY_ACCOUNT_NUMBER:-}
      - YOOMONEY_API_KEY=${YOOMONEY_API_KEY:-}
      - YOOMONEY_WEBHOOK_URL=${YOOMONEY_WEBHOOK_URL:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FRONTEND_URL=http://frontend:3000
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      supabase:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - vk-bot-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Supabase (PostgreSQL)
  supabase:
    image: postgres:15-alpine
    container_name: supabase
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=vk_bot
    volumes:
      - supabase_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    networks:
      - vk-bot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vk_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis (caching, sessions)
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    # Redis доступен только внутри сети
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - vk-bot-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Watchtower (auto-update)
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 86400
    networks:
      - vk-bot-network

networks:
  vk-bot-network:
    driver: bridge

volumes:
  supabase_data:
  redis_data:
  php_storage:
  php_bootstrap:
