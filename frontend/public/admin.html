<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка - VK Neuro-Agents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .nav { display: flex; gap: 10px; margin-bottom: 30px; }
    .nav a { text-decoration: none; color: #667eea; padding: 10px 20px; background: white; border-radius: 10px; }
    .nav a.active { background: #667eea; color: white; }
    .section { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .btn { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; }
    .btn-success { background: #28a745; }
    .btn-danger { background: #dc3545; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; border-radius: 15px; }
    .stat-card h3 { font-size: 14px; opacity: 0.9; }
    .stat-card .value { font-size: 32px; font-weight: bold; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { color: #888; font-weight: normal; font-size: 14px; }
    
    /* Toggle Switch */
    .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 26px; }
    .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #28a745; }
    input:checked + .slider:before { transform: translateX(24px); }
    
    .method-card { border: 2px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    .method-card.active { border-color: #28a745; background: #f0fff4; }
    .method-info h4 { margin-bottom: 5px; }
    .method-info p { color: #888; font-size: 14px; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    .badge-success { background: #d4edda; color: #155724; }
    .badge-secondary { background: #eee; color: #666; }
    .empty { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚙️ Админ-панель</h1>
    <button class="btn" onclick="window.location.href='/dashboard.html'">← К пользователю</button>
  </div>

  <div class="container">
    <div class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="bots.html">Боты</a>
      <a href="payments.html">Оплата</a>
      <a href="settings.html">Настройки</a>
      <a href="admin.html" class="active">Админка</a>
    </div>

    <!-- Статистика -->
    <div class="grid" id="statsGrid">
      <div class="stat-card">
        <h3>Пользователей</h3>
        <div class="value" id="totalUsers">-</div>
      </div>
      <div class="stat-card">
        <h3>Ботов активно</h3>
        <div class="value" id="activeBots">-</div>
      </div>
      <div class="stat-card">
        <h3>Платежей</h3>
        <div class="value" id="totalPayments">-</div>
      </div>
      <div class="stat-card">
        <h3>Доход</h3>
        <div class="value" id="totalRevenue">-</div>
      </div>
    </div>

    <!-- Управление методами оплаты -->
    <div class="section">
      <h2>💳 Методы оплаты</h2>
      <p style="color: #888; margin-bottom: 20px;">Включайте и выключайте доступные методы оплаты для пользователей</p>
      <div id="paymentMethodsList">Загрузка...</div>
    </div>

    <!-- Пользователи -->
    <div class="section">
      <h2>👥 Пользователи</h2>
      <div id="usersList">Загрузка...</div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    const auth = JSON.parse(localStorage.getItem('auth') || 'null');
    
    if (!auth || !['admin', 'superadmin'].includes(auth.user?.role)) {
      alert('Требуется роль администратора');
      window.location.href = '/dashboard.html';
    }

    loadStats();
    loadPaymentMethods();
    loadUsers();

    // Загрузка статистики
    function loadStats() {
      fetch(`${API_URL}/api/admin/analytics`, {
        headers: { 'Authorization': `Bearer ${auth.tokens.accessToken}` }
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          document.getElementById('totalUsers').textContent = data.data.totalUsers || 0;
          document.getElementById('activeBots').textContent = data.data.activeBots || 0;
          document.getElementById('totalPayments').textContent = data.data.totalPayments || 0;
          document.getElementById('totalRevenue').textContent = `${data.data.totalRevenue || 0}₽`;
        }
      })
      .catch(() => {});
    }

    // Загрузка методов оплаты
    function loadPaymentMethods() {
      fetch(`${API_URL}/api/admin/payment-methods`, {
        headers: { 'Authorization': `Bearer ${auth.tokens.accessToken}` }
      })
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('paymentMethodsList');
        if (data.success && data.data.length > 0) {
          list.innerHTML = data.data.map(m => `
            <div class="method-card ${m.isEnabled ? 'active' : ''}">
              <div class="method-info">
                <h4>${m.displayName}</h4>
                <p>${m.description || 'Метод оплаты'}</p>
                <p style="margin-top: 8px;">
                  <span class="badge ${m.isEnabled ? 'badge-success' : 'badge-secondary'}">
                    ${m.isEnabled ? 'Включен' : 'Выключен'}
                  </span>
                  ${m.sort_order === 1 ? '<span class="badge badge-success">По умолчанию</span>' : ''}
                </p>
              </div>
              <label class="switch">
                <input type="checkbox" ${m.isEnabled ? 'checked' : ''} 
                       onchange="toggleMethod('${m.id}', this.checked)">
                <span class="slider"></span>
              </label>
            </div>
          `).join('');
        } else {
          list.innerHTML = '<div class="empty">Нет методов оплаты</div>';
        }
      });
    }

    // Переключение метода оплаты
    function toggleMethod(id, isEnabled) {
      fetch(`${API_URL}/api/admin/payment-methods/${id}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${auth.tokens.accessToken}`
        },
        body: JSON.stringify({ isEnabled })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          loadPaymentMethods();
        } else {
          alert('Ошибка: ' + data.error?.message);
        }
      });
    }

    // Загрузка пользователей
    function loadUsers() {
      fetch(`${API_URL}/api/admin/users?limit=50`, {
        headers: { 'Authorization': `Bearer ${auth.tokens.accessToken}` }
      })
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('usersList');
        if (data.success && data.data.length > 0) {
          list.innerHTML = `
            <table>
              <thead>
                <tr>
                  <th>Имя</th>
                  <th>Email</th>
                  <th>Роль</th>
                  <th>Баланс</th>
                  <th>Статус</th>
                </tr>
              </thead>
              <tbody>
                ${data.data.map(u => `
                  <tr>
                    <td>${u.username || 'Без имени'}</td>
                    <td>${u.email || '-'}</td>
                    <td>${u.role}</td>
                    <td>${u.balance}₽</td>
                    <td>
                      <span class="badge ${u.isBlocked ? 'badge-danger' : 'badge-success'}" 
                            style="background: ${u.isBlocked ? '#f8d7da' : '#d4edda'}; 
                                   color: ${u.isBlocked ? '#721c24' : '#155724'}; 
                                   padding: 4px 12px; border-radius: 20px; font-size: 12px;">
                        ${u.isBlocked ? 'Заблокирован' : 'Активен'}
                      </span>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        } else {
          list.innerHTML = '<div class="empty">Нет пользователей</div>';
        }
      });
    }
  </script>
</body>
</html>
