<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки - VK Neuro-Agents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .nav { display: flex; gap: 10px; margin-bottom: 30px; }
    .nav a { text-decoration: none; color: #667eea; padding: 10px 20px; background: white; border-radius: 10px; }
    .nav a.active { background: #667eea; color: white; }
    .section { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .btn { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    label { display: block; margin-bottom: 5px; color: #555; }
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; }
    .info-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; }
    .info-value { font-weight: bold; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: #667eea; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚙️ Настройки</b1>
    <button class="btn" onclick="window.location.href='/dashboard.html'">← Назад</button>
  </div>

  <div class="container">
    <div class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="bots.html">Боты</a>
      <a href="payments.html">Оплата</a>
      <a href="#" class="active">Настройки</a>
    </div>

    <div class="grid">
      <div class="section">
        <h2>Профиль</h2>
        <div class="avatar" id="avatar">👤</div>
        <label>Имя пользователя</label>
        <input type="text" id="username" readonly>
        <label>Email</label>
        <input type="email" id="email">
        <button class="btn" onclick="updateProfile()">Сохранить</button>
        <div id="saveStatus" style="margin-top: 10px;"></div>
      </div>

      <div class="section">
        <h2>Информация</h2>
        <div class="info-row">
          <span class="info-label">ID</span>
          <span class="info-value" id="userId">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">VK ID</span>
          <span class="info-value" id="vkId">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Роль</span>
          <span class="info-value" id="role">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Баланс</span>
          <span class="info-value" id="balance">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Дата регистрации</span>
          <span class="info-value" id="createdAt">-</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    const auth = JSON.parse(localStorage.getItem('auth') || 'null');
    if (!auth) window.location.href = '/';

    // Загрузка данных
    const { user } = auth;
    document.getElementById('username').value = user.username;
    document.getElementById('email').value = user.email || '';
    document.getElementById('userId').textContent = user.id.slice(0, 8) + '...';
    document.getElementById('vkId').textContent = user.vkId;
    document.getElementById('role').textContent = user.role;
    document.getElementById('balance').textContent = user.balance + '₽';
    document.getElementById('createdAt').textContent = new Date(user.createdAt).toLocaleDateString('ru-RU');

    function updateProfile() {
      const email = document.getElementById('email').value;
      
      fetch('http://localhost:4000/api/user/profile', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${auth.tokens.accessToken}`
        },
        body: JSON.stringify({ email })
      })
      .then(res => res.json())
      .then(data => {
        const status = document.getElementById('saveStatus');
        if (data.success) {
          status.textContent = '✅ Сохранено';
          status.style.color = 'green';
        } else {
          status.textContent = '❌ Ошибка: ' + data.error?.message;
          status.style.color = 'red';
        }
      });
    }
  </script>
</body>
</html>
