<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Боты - VK Neuro-Agents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .nav { display: flex; gap: 10px; margin-bottom: 30px; }
    .nav a { text-decoration: none; color: #667eea; padding: 10px 20px; background: white; border-radius: 10px; }
    .nav a.active { background: #667eea; color: white; }
    .section { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .btn { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; }
    .btn-success { background: #28a745; }
    .btn-danger { background: #dc3545; }
    .card { border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; }
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin: 10px 0 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 Мои боты</h1>
    <button class="btn" onclick="window.location.href='/dashboard.html'">← Назад</button>
  </div>

  <div class="container">
    <div class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="#" class="active">Боты</a>
      <a href="payments.html">Оплата</a>
      <a href="settings.html">Настройки</a>
    </div>

    <div class="section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Список ботов</h2>
        <button class="btn" onclick="showCreateModal()">+ Создать бота</button>
      </div>
      <div id="botsList">Загрузка...</div>
    </div>
  </div>

  <div class="modal" id="createModal">
    <div class="modal-content">
      <h3>Создать бота</h3>
      <input type="text" id="botName" placeholder="Название бота">
      <div style="display: flex; gap: 10px; justify-content: flex-end;">
        <button class="btn" onclick="hideCreateModal()">Отмена</button>
        <button class="btn btn-success" onclick="createBot()">Создать</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    const auth = JSON.parse(localStorage.getItem('auth') || 'null');
    if (!auth) window.location.href = '/';

    loadBots();

    function loadBots() {
      fetch(`${API_URL}/api/bots`, {
        headers: { 'Authorization': `Bearer ${auth.tokens.accessToken}` }
      })
      .then(res => res.json())
      .then(data => {
        const botsList = document.getElementById('botsList');
        if (data.success && data.data.length > 0) {
          botsList.innerHTML = data.data.map(bot => `
            <div class="card">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                  <h3>${bot.name}</h3>
                  <p style="color: #888; font-size: 14px;">Статус: ${bot.status}</p>
                  <p style="color: #888; font-size: 14px;">Сообщений: ${bot.messagesSent} отпр. / ${bot.messagesReceived} получ.</p>
                </div>
                <div style="display: flex; gap: 10px;">
                  <button class="btn ${bot.status === 'active' ? 'btn-danger' : 'btn-success'}" 
                          onclick="toggleBot('${bot.id}', '${bot.status}')">
                    ${bot.status === 'active' ? 'Остановить' : 'Запустить'}
                  </button>
                  <button class="btn btn-danger" onclick="deleteBot('${bot.id}')">Удалить</button>
                </div>
              </div>
            </div>
          `).join('');
        } else {
          botsList.innerHTML = '<p style="text-align: center; color: #888; padding: 40px;">У вас пока нет ботов</p>';
        }
      })
      .catch(() => {
        document.getElementById('botsList').innerHTML = '<p style="text-align: center; color: #f00;">Ошибка загрузки</p>';
      });
    }

    function showCreateModal() { document.getElementById('createModal').classList.add('active'); }
    function hideCreateModal() { document.getElementById('createModal').classList.remove('active'); }

    function createBot() {
      const name = document.getElementById('botName').value.trim();
      if (!name) return alert('Введите название');

      fetch(`${API_URL}/api/bots`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${auth.tokens.accessToken}`
        },
        body: JSON.stringify({ name })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          hideCreateModal();
          loadBots();
          document.getElementById('botName').value = '';
        } else {
          alert('Ошибка: ' + data.error?.message);
        }
      });
    }

    function toggleBot(id, status) {
      const action = status === 'active' ? 'stop' : 'start';
      fetch(`${API_URL}/api/bots/${id}/${action}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${auth.tokens.accessToken}` }
      })
      .then(() => loadBots());
    }

    function deleteBot(id) {
      if (!confirm('Удалить бота?')) return;
      fetch(`${API_URL}/api/bots/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${auth.tokens.accessToken}` }
      })
      .then(() => loadBots());
    }
  </script>
</body>
</html>
