<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата - VK Neuro-Agents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .nav { display: flex; gap: 10px; margin-bottom: 30px; }
    .nav a { text-decoration: none; color: #667eea; padding: 10px 20px; background: white; border-radius: 10px; }
    .nav a.active { background: #667eea; color: white; }
    .section { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .btn { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin: 10px 0; }
    .method { border: 2px solid #eee; padding: 20px; border-radius: 10px; cursor: pointer; transition: all 0.3s; }
    .method:hover { border-color: #667eea; }
    .method.selected { border-color: #667eea; background: #f0f3ff; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { color: #888; font-weight: normal; font-size: 14px; }
    .status { padding: 5px 12px; border-radius: 20px; font-size: 12px; }
    .status.succeeded { background: #d4edda; color: #155724; }
    .status.pending { background: #fff3cd; color: #856404; }
    .status.failed { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="header">
    <h1>💳 Оплата</h1>
    <button class="btn" onclick="window.location.href='/dashboard.html'">← Назад</button>
  </div>

  <div class="container">
    <div class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="bots.html">Боты</a>
      <a href="#" class="active">Оплата</a>
      <a href="settings.html">Настройки</a>
    </div>

    <div class="grid">
      <div class="section">
        <h2>Пополнить баланс</h2>
        <input type="number" id="amount" placeholder="Сумма (₽)" min="100" max="100000">
        <h3 style="margin: 20px 0 10px;">Метод оплаты</h3>
        <div class="method" onclick="selectMethod(this, 'yookassa')">
          <strong>ЮKassa</strong>
          <p style="color: #888; font-size: 14px;">Банковские карты, СБП</p>
        </div>
        <div class="method selected" onclick="selectMethod(this, 'yoomoney_p2p')">
          <strong>ЮMoney P2P</strong>
          <p style="color: #888; font-size: 14px;">Перевод на счёт физлица (по умолчанию)</p>
        </div>
        <button class="btn" style="width: 100%; margin-top: 20px;" onclick="createPayment()">Пополнить</button>
      </div>

      <div class="section">
        <h2>История платежей</h2>
        <div id="paymentsList">Загрузка...</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    const auth = JSON.parse(localStorage.getItem('auth') || 'null');
    if (!auth) window.location.href = '/';
    let selectedMethod = 'yoomoney_p2p'; // ЮMoney по умолчанию

    loadPayments();

    function selectMethod(el, method) {
      document.querySelectorAll('.method').forEach(m => m.classList.remove('selected'));
      el.classList.add('selected');
      selectedMethod = method;
    }

    function createPayment() {
      const amount = parseInt(document.getElementById('amount').value);
      if (!amount || amount < 100) return alert('Минимальная сумма 100₽');

      fetch(`${API_URL}/api/payments/create`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${auth.tokens.accessToken}`
        },
        body: JSON.stringify({ amount, method: selectedMethod })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          alert(`Создан платёж на ${amount}₽\n\n${data.data.instruction || 'Перейдите к оплате: ' + data.data.confirmationUrl}`);
          loadPayments();
        } else {
          alert('Ошибка: ' + data.error?.message);
        }
      });
    }

    function loadPayments() {
      fetch(`${API_URL}/api/payments`, {
        headers: { 'Authorization': `Bearer ${auth.tokens.accessToken}` }
      })
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('paymentsList');
        if (data.success && data.data.length > 0) {
          list.innerHTML = `
            <table>
              <thead>
                <tr>
                  <th>Сумма</th>
                  <th>Метод</th>
                  <th>Статус</th>
                  <th>Дата</th>
                </tr>
              </thead>
              <tbody>
                ${data.data.map(p => `
                  <tr>
                    <td>${p.amount}₽</td>
                    <td>${p.provider}</td>
                    <td><span class="status ${p.status}">${p.status}</span></td>
                    <td>${new Date(p.createdAt).toLocaleDateString('ru-RU')}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        } else {
          list.innerHTML = '<p style="text-align: center; color: #888; padding: 20px;">История пуста</p>';
        }
      });
    }
  </script>
</body>
</html>
