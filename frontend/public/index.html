<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VK Neuro-Agents - Вход</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container fade-in">
    <div class="logo">🤖</div>
    <h1>VK Neuro-Agents</h1>
    <p class="subtitle">Панель управления нейро-агентами ВКонтакте</p>
    
    <!-- Email форма -->
    <div id="email-forms">
      <!-- Форма входа -->
      <div id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Пароль</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button class="btn btn-primary" onclick="handleEmailLogin()">Войти</button>
        <p class="footer-text">
          Нет аккаунта? <a href="#" class="link" onclick="showRegister()">Зарегистрироваться</a>
        </p>
      </div>
      
      <!-- Форма регистрации -->
      <div id="register-form" class="hidden">
        <div class="form-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="register-password">Пароль (мин. 6 символов)</label>
          <input type="password" id="register-password" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label for="register-username">Имя пользователя</label>
          <input type="text" id="register-username" placeholder="username">
        </div>
        <button class="btn btn-primary" onclick="handleRegister()">Зарегистрироваться</button>
        <p class="footer-text">
          Уже есть аккаунт? <a href="#" class="link" onclick="showLogin()">Войти</a>
        </p>
      </div>
    </div>
    
    <div class="divider"><span>ИЛИ</span></div>
    
    <!-- Кнопка VK -->
    <button class="btn btn-vk" onclick="manualVKLogin()">
      Войти через VK
    </button>
    
    <div id="status"></div>
  </div>

  <script>
    const API_URL = window.location.origin;
    
    // Переключение между входом и регистрацией
    function showLogin() {
      document.getElementById('login-form').classList.remove('hidden');
      document.getElementById('register-form').classList.add('hidden');
    }
    
    function showRegister() {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('register-form').classList.remove('hidden');
    }
    
    // Email вход
    async function handleEmailLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      if (!email || !password) {
        showStatus('❌ Введите email и пароль', 'error');
        return;
      }
      
      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('auth', JSON.stringify(data.data));
          showStatus('✅ Вход успешен! Перенаправление...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showStatus('❌ Ошибка: ' + (data.error?.message || 'Неверные данные'), 'error');
        }
      } catch (error) {
        showStatus('❌ Ошибка подключения к серверу', 'error');
      }
    }
    
    // Email регистрация
    async function handleRegister() {
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const username = document.getElementById('register-username').value;
      
      if (!email || !password) {
        showStatus('❌ Введите email и пароль', 'error');
        return;
      }
      
      if (password.length < 6) {
        showStatus('❌ Пароль должен быть не менее 6 символов', 'error');
        return;
      }
      
      try {
        const response = await fetch(`${API_URL}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, username })
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('auth', JSON.stringify(data.data));
          showStatus('✅ Регистрация успешна! Перенаправление...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showStatus('❌ Ошибка: ' + (data.error?.message || 'Ошибка регистрации'), 'error');
        }
      } catch (error) {
        showStatus('❌ Ошибка подключения к серверу', 'error');
      }
    }
    
    // Ручной вход через VK
    function manualVKLogin() {
      const clientId = '{{VK_CLIENT_ID}}'; // Заменяется при деплое
      const authUrl = `https://oauth.vk.com/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(window.location.origin)}&response_type=code&scope=messages,groups,offline`;
      window.location.href = authUrl;
    }

    // Обработка VK OAuth callback
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    
    if (code) {
      // Это callback от VK - обмениваем код на токен
      showStatus('⏳ Обработка входа через VK...', 'success');
      
      fetch(`${API_URL}/api/auth/vk`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem('auth', JSON.stringify(data.data));
          showStatus('✅ Вход через VK успешен! Перенаправление...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showStatus('❌ Ошибка VK: ' + (data.error?.message || 'Не удалось войти'), 'error');
          // Очищаем URL от code параметра
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      })
      .catch(err => {
        showStatus('❌ Ошибка подключения к серверу', 'error');
        window.history.replaceState({}, document.title, window.location.pathname);
      });
    }

    // Статус
    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
    }
    
    // Проверка авторизации
    const auth = JSON.parse(localStorage.getItem('auth') || 'null');
    if (auth) {
      window.location.href = '/dashboard.html';
    }
  </script>
</body>
</html>
